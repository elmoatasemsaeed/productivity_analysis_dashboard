<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Story Analysis System</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="data:,">
    <!-- Chart.js for historical analytics -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        /* تنسيقات شاشة تسجيل الدخول */
        #login-overlay {
            position: fixed;
            inset: 0;
            background: rgba(44, 62, 80, 0.95);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-card {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            width: 100%;
            max-width: 400px;
        }
        .login-card input {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border: 1px solid #ddd;
            border-radius: 6px;
            box-sizing: border-box;
        }
        .login-card button {
            width: 100%;
            padding: 12px;
            background: #3498db;
            color: white;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
        }
        .login-card button:hover { background: #2980b9; }
        
        /* إخفاء عناصر الإدارة افتراضياً */
        .admin-only { display: none; } 
    </style>
</head>
<body>

    <div id="login-overlay">
        <div class="login-card">
            <h2 style="text-align: center;">System Login</h2>
            <input type="text" id="loginUser" placeholder="Username">
            <input type="password" id="loginPass" placeholder="Password">
            <input type="password" id="ghTokenInput" placeholder="GitHub Token">
            <input type="password" id="azurePatInput" placeholder="Azure DevOps PAT">
            
            <label style="font-size: 0.8em; color: #555;">
                <input type="checkbox" id="rememberMe"> Remember Me
            </label>
            <button onclick="attemptLogin()">Login</button>
        </div>
    </div>

    <header>
        <h1>Productivity Analysis Dashboard</h1>
    </header>

    <nav id="main-nav" style="display:none; gap: 10px; align-items: center; padding: 10px; background: #2c3e50; flex-wrap: wrap;">
        <input type="file" id="csvFile" accept=".csv" style="display:none;" onchange="handleUpload()">
        <button onclick="document.getElementById('csvFile').click()" class="admin-only">Upload CSV</button>
        
        <select id="azureIterationSelect" style="padding: 8px; border-radius: 4px;">
            <option value="">Select Iteration...</option>
        </select>
        <button id="fetchAzureBtn" onclick="fetchFromAzure()" style="background: #0078d4;">Fetch from Azure</button>
        
        <button onclick="syncAllIterationsData()" class="admin-only" style="background: #8e44ad;">Sync All Iterations Data</button>
        
        <div style="border-left: 1px solid #555; height: 30px; margin: 0 10px;"></div>

        <button onclick="showView('iteration-view')">Iteration Summary</button>
        <button onclick="showView('business-view')">Business Area View</button>
        <button onclick="showView('team-view')">Team View</button>
        <button onclick="showView('people-view')">People View</button>
        <button onclick="showView('not-tested-view')">Not Tested</button>
        
        <button onclick="showView('historical-analytics-view')">Historical Trends</button>
        
        <button onclick="showView('azure-settings-view')" class="admin-only">Azure Config</button>
        <button onclick="showView('users-view')" class="admin-only">Manage Users</button>
        <button onclick="showView('holidays-view')" class="admin-only">Manage Holidays</button>
        
        <button onclick="logout()" style="background: #e74c3c; margin-left: auto;">Logout</button>
    </nav>

    <div id="sync-status" style="text-align: center; padding: 10px; background: #e8f4fd; display: none;">
        Connecting to GitHub...
    </div>

    <main id="content">
        <div id="welcome-msg" class="view">
            <p>Please wait, loading data from GitHub...</p>
        </div>

        <div id="iteration-view" class="view" style="display:none;"></div>
        <div id="business-view" class="view" style="display:none;"></div>
        <div id="team-view" class="view" style="display:none;"></div>
        <div id="people-view" class="view" style="display:none;"></div>
        <div id="not-tested-view" class="view" style="display:none;"></div>
        
        <div id="historical-analytics-view" class="view" style="display:none; padding: 20px;">
            <h2>Cross‑Iteration Performance Trends</h2>
            <div style="display: flex; gap: 20px; flex-wrap: wrap;">
                <div style="flex: 1; min-width: 300px; background: white; border-radius: 12px; padding: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.1);">
                    <canvas id="cycleTimeChart" width="400" height="300"></canvas>
                </div>
                <div style="flex: 1; min-width: 300px; background: white; border-radius: 12px; padding: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.1);">
                    <canvas id="storiesBugsChart" width="400" height="300"></canvas>
                </div>
            </div>
            <div id="historicalSummaryTable" style="margin-top: 30px; overflow-x: auto;"></div>
        </div>

        <div id="azure-settings-view" class="view" style="display:none; padding: 20px;">
            <h3>Manage Azure DevOps Queries</h3>
            <div class="card" style="padding: 20px; max-width: 600px; background: #f9f9f9; border-radius: 8px;">
                <input type="text" id="azOrg" placeholder="Organization (e.g. MyOrg)" style="width:100%; padding:8px; margin-bottom:10px;">
                <input type="text" id="azProject" placeholder="Project Name" style="width:100%; padding:8px; margin-bottom:10px;">
                <input type="text" id="azQueryId" placeholder="Query ID (GUID)" style="width:100%; padding:8px; margin-bottom:10px;">
                <input type="text" id="azQueryName" placeholder="Friendly Name (e.g. Sprint 25)" style="width:100%; padding:8px; margin-bottom:10px;">
                <button onclick="addAzureConfig()">Add Query</button>
            </div>
            <table style="margin-top: 20px; width: 100%; border-collapse: collapse;">
                <thead>
                    <tr style="background:#eee;">
                        <th>Name</th>
                        <th>Org/Project</th>
                        <th>Query ID</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="azureConfigsTableBody"></tbody>
            </table>
        </div>

        <div id="users-view" class="view" style="display:none; padding: 20px;">
            <h3>User Management</h3>
            <div class="card" style="padding: 20px; max-width: 600px; background: #f9f9f9; border-radius: 8px;">
                <input type="text" id="newUserName" placeholder="Username" style="width:100%; padding:8px; margin-bottom:10px;">
                <input type="text" id="newUserPass" placeholder="Password" style="width:100%; padding:8px; margin-bottom:10px;">
                <select id="newUserRole" style="width:100%; padding:8px; margin-bottom:10px;">
                    <option value="viewer">Viewer</option>
                    <option value="admin">Admin</option>
                </select>
                <button onclick="addUser()">Add/Update User</button>
            </div>
            <table style="margin-top: 20px; width: 100%; border-collapse: collapse;">
                <thead>
                    <tr style="background:#eee;">
                        <th>Username</th>
                        <th>Password</th>
                        <th>Role</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="usersListTable"></tbody>
            </table>
        </div>

        <div id="holidays-view" class="view" style="display:none; padding: 20px;">
            <h3>Define Public Holidays</h3>
            <input type="date" id="holidayPicker" style="padding:8px;">
            <button onclick="addHoliday()">Add Holiday</button>
            <ul id="holidaysList" style="margin-top:15px;"></ul>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
